<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shell 30天系统学习计划</title>
<style>
:root {
  --bg: #0c0e14;
  --surface: #141822;
  --card: #1b2030;
  --card-hover: #222840;
  --border: rgba(255,255,255,0.07);
  --text: #e4e6ef;
  --muted: #7a7f94;
  --accent: #3ecf8e;
  --accent2: #38bdf8;
  --accent3: #f472b6;
  --amber: #fbbf24;
  --green: #3ecf8e;
  --red: #ef4444;
  --cursor: #3ecf8e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace;min-height:100vh}
::selection{background:var(--accent);color:#000}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

.header{background:linear-gradient(160deg,#0d1117 0%,#161b22 40%,#0d1117 100%);padding:2.5rem 1.5rem 2rem;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.header::before{content:'$ ';position:absolute;top:20px;left:20px;font-size:0.7rem;color:var(--muted);opacity:0.3}
.header::after{content:'';position:absolute;top:0;right:0;width:300px;height:300px;background:radial-gradient(circle,rgba(62,207,142,0.06) 0%,transparent 70%);pointer-events:none}
.header-inner{max-width:960px;margin:0 auto;position:relative;z-index:1}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.logo-icon{width:42px;height:42px;border-radius:8px;background:linear-gradient(135deg,#3ecf8e,#38bdf8);display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:#000}
.logo h1{font-size:1.3rem;font-weight:600;color:var(--text);letter-spacing:-0.5px}
.logo h1 span{color:var(--accent)}

.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:1rem}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-width:100px;flex:1}
.stat-label{font-size:0.65rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px;margin-bottom:4px}
.stat-val{font-size:1.3rem;font-weight:700;color:var(--accent)}
.stat-val.blue{color:var(--accent2)}
.stat-val.pink{color:var(--accent3)}
.stat-val.amber{color:var(--amber)}

.progress-bar-wrap{margin-top:1rem;background:var(--surface);border-radius:4px;height:6px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width 0.5s ease}

.controls{max-width:960px;margin:1.5rem auto 0;padding:0 1.5rem;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:0.8rem;outline:none;transition:border-color 0.2s}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--muted)}
.filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 14px;color:var(--muted);font-family:inherit;font-size:0.72rem;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(62,207,142,0.05)}

.content{max-width:960px;margin:1.5rem auto;padding:0 1.5rem 3rem}
.phase-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin:2rem 0 1rem;padding-left:4px;display:flex;align-items:center;gap:8px}
.phase-title::before{content:'#';color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all 0.25s ease;position:relative;overflow:hidden}
.card:hover{background:var(--card-hover);border-color:rgba(62,207,142,0.2);transform:translateY(-2px)}
.card.completed{border-color:rgba(62,207,142,0.3)}
.card.completed::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.card.today{border-color:rgba(56,189,248,0.4);box-shadow:0 0 20px rgba(56,189,248,0.08)}
.card.today::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent2)}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.day-num{font-size:0.65rem;color:var(--muted);letter-spacing:1px}
.badge{font-size:0.6rem;padding:2px 8px;border-radius:10px;font-weight:600}
.badge.done{background:rgba(62,207,142,0.15);color:var(--accent)}
.badge.now{background:rgba(56,189,248,0.15);color:var(--accent2)}
.card-title{font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:8px;font-family:'SF Pro Display',-apple-system,sans-serif}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tag{font-size:0.6rem;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,0.04);color:var(--muted);border:1px solid rgba(255,255,255,0.05)}
.card-preview{font-size:0.68rem;color:var(--muted);line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-foot{display:flex;justify-content:space-between;align-items:center}
.complete-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:4px 10px;font-size:0.65rem;color:var(--muted);cursor:pointer;font-family:inherit;transition:all 0.2s}
.complete-btn:hover{border-color:var(--accent);color:var(--accent)}
.complete-btn.done{background:rgba(62,207,142,0.1);border-color:var(--accent);color:var(--accent)}
.detail-btn{background:none;border:none;color:var(--accent2);font-size:0.68rem;cursor:pointer;font-family:inherit;padding:4px 0}
.detail-btn:hover{text-decoration:underline}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:100;justify-content:center;align-items:flex-start;padding:2rem 1rem;overflow-y:auto;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;max-width:760px;width:100%;padding:2rem;position:relative;animation:slideUp 0.3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px 8px;border-radius:4px;font-family:inherit}
.modal-close:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.modal-day{font-size:0.65rem;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.modal-title{font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:6px;font-family:'SF Pro Display',-apple-system,sans-serif}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.topic-block{margin-bottom:1.5rem;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.topic-head{padding:12px 16px;background:rgba(255,255,255,0.02);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background 0.2s}
.topic-head:hover{background:rgba(255,255,255,0.04)}
.topic-name{font-size:0.85rem;font-weight:600;color:var(--accent2)}
.topic-toggle{font-size:0.7rem;color:var(--muted);transition:transform 0.2s}
.topic-body{padding:0 16px 16px;display:none}
.topic-body.open{display:block}
.topic-explain{font-size:0.78rem;color:var(--muted);line-height:1.7;margin:12px 0;font-family:'SF Pro Text',-apple-system,sans-serif}
pre.code-block{background:#0d1117;border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:14px 16px;overflow-x:auto;font-size:0.75rem;line-height:1.7;color:#c9d1d9;margin:10px 0;position:relative}
pre.code-block .comment{color:#8b949e}
pre.code-block .keyword{color:#ff7b72}
pre.code-block .string{color:#a5d6ff}
pre.code-block .var{color:#ffa657}
pre.code-block .cmd{color:#79c0ff}
.tip-box{background:rgba(62,207,142,0.06);border:1px solid rgba(62,207,142,0.15);border-radius:6px;padding:10px 14px;font-size:0.72rem;color:var(--accent);line-height:1.6;margin-top:10px}
.tip-box::before{content:'TIP: ';font-weight:700}
.exercise-box{background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.15);border-radius:6px;padding:12px 14px;margin-top:1.5rem}
.exercise-box h4{font-size:0.72rem;color:var(--accent2);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.exercise-box p{font-size:0.76rem;color:var(--text);line-height:1.7;font-family:'SF Pro Text',-apple-system,sans-serif}
.modal-complete{display:block;width:100%;margin-top:1.5rem;padding:10px;background:rgba(62,207,142,0.1);border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-family:inherit;font-size:0.8rem;cursor:pointer;font-weight:600;transition:all 0.2s}
.modal-complete:hover{background:rgba(62,207,142,0.2)}
.modal-complete.done{background:var(--accent);color:#000}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--accent);border-radius:8px;padding:12px 20px;font-size:0.78rem;color:var(--accent);z-index:200;transition:transform 0.4s ease;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .header{padding:1.5rem 1rem 1.5rem}
  .controls{padding:0 1rem}
  .content{padding:0 1rem 3rem}
  .grid{grid-template-columns:1fr}
  .stats-row{flex-direction:column}
  .modal{padding:1.5rem}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">$_</div>
      <h1>Shell <span>30天</span>系统学习</h1>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-label">已完成</div><div class="stat-val" id="s-done">0/30</div></div>
      <div class="stat-box"><div class="stat-label">连续天数</div><div class="stat-val blue" id="s-streak">0</div></div>
      <div class="stat-box"><div class="stat-label">当前阶段</div><div class="stat-val pink" id="s-phase">—</div></div>
      <div class="stat-box"><div class="stat-label">总进度</div><div class="stat-val amber" id="s-pct">0%</div></div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="pbar" style="width:0%"></div></div>
  </div>
</div>

<div class="controls">
  <input class="search-box" id="searchInput" placeholder="搜索课程、命令、关键词..." oninput="render()">
  <button class="filter-btn active" onclick="setFilter('all')">全部</button>
  <button class="filter-btn" onclick="setFilter('todo')">待学</button>
  <button class="filter-btn" onclick="setFilter('done')">已完成</button>
</div>

<div class="content" id="content"></div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const startDate = "2026-03-22";
let completed = JSON.parse(localStorage.getItem("shell30_done") || "[]");
let currentFilter = "all";

const curriculum = [
  {
    phase: "第一阶段：Shell 基础入门",
    desc: "命令行基本操作与文件系统",
    days: [
      {
        day:1, title:"终端初体验：命令行世界", tags:["terminal","基础"],
        topics:[
          {name:"什么是 Shell / Bash / Terminal",
           explain:"Shell 是操作系统的命令行解释器，Bash（Bourne Again Shell）是最流行的 Shell。Terminal 是你跟 Shell 交互的窗口。就像 Python 有解释器一样，Shell 也是一种编程语言，但它天生就是为操作文件和程序而设计的。",
           code:"# 查看当前使用的 Shell\necho $SHELL\n\n# 查看 Bash 版本\nbash --version\n\n# 查看所有可用的 Shell\ncat /etc/shells\n\n# 切换到 bash\nbash\n\n# 查看当前用户\nwhoami\n\n# 查看主机名\nhostname",
           tip:"Mac 新版默认是 zsh，但 zsh 和 bash 语法 95% 兼容，学 bash 等于两个都会了"},
          {name:"命令的基本结构",
           explain:"所有 Shell 命令都遵循一个格式：命令 [选项] [参数]。选项通常以 - 或 -- 开头，参数是命令操作的对象。这跟 Python 调用函数传参数是一个道理。",
           code:"# 命令结构: command [options] [arguments]\n\n# 最简单的命令——输出文字\necho \"Hello Shell\"\n\n# 带选项的命令\nls -l          # -l 是选项（长格式显示）\nls -la         # 多个选项可以合并\nls --all       # 用全称也行\n\n# 带参数的命令\nls /home       # /home 是参数（指定目录）\nls -l /home    # 选项 + 参数组合\n\n# 查看命令帮助的三种方式\nman ls         # 完整手册（按 q 退出）\nls --help      # 简短帮助\nwhich ls       # 看命令在哪个路径",
           tip:"记不住选项很正常，用 man 或 --help 查就行，别死记硬背"},
          {name:"快捷键——提高效率的关键",
           explain:"命令行的快捷键能让你的操作速度翻倍。这些是 readline 库提供的，几乎所有终端通用。",
           code:"# 光标移动\nCtrl + A    # 跳到行首\nCtrl + E    # 跳到行尾\nAlt  + B    # 往左跳一个单词\nAlt  + F    # 往右跳一个单词\n\n# 编辑\nCtrl + U    # 删除光标前所有内容\nCtrl + K    # 删除光标后所有内容\nCtrl + W    # 删除光标前一个单词\nCtrl + Y    # 粘贴刚删除的内容\n\n# 历史\nCtrl + R    # 反向搜索历史命令（超有用！）\n!!          # 重复上一条命令\n!$          # 上一条命令的最后一个参数\n\n# 控制\nCtrl + C    # 中断当前命令\nCtrl + D    # 退出当前 Shell\nCtrl + L    # 清屏（等于 clear）\nTab         # 自动补全（按两下显示所有选项）"}
        ],
        exercise:"打开终端，用 echo 输出你的名字；用 man 查看 ls 的手册并找到「按文件大小排序」的选项；用 Ctrl+R 搜索你刚执行过的命令。"
      },
      {
        day:2, title:"文件系统导航", tags:["文件系统","cd","pwd","ls"],
        topics:[
          {name:"Linux 目录结构",
           explain:"Linux 的文件系统像一棵倒过来的树，根目录 / 是起点。和 Windows 不同，这里没有 C: D: 盘的概念，一切都挂在 / 下面。理解目录结构对做 ESP32 固件编译、Python 虚拟环境管理都很有用。",
           code:"# 重要目录\n/           # 根目录，一切的起点\n/home       # 用户目录（你的文件都在这里）\n/root       # root 用户的 home\n/etc        # 系统配置文件\n/var        # 日志、缓存等动态文件\n/tmp        # 临时文件（重启会清空）\n/usr        # 用户程序（bin、lib、share）\n/opt        # 第三方软件\n/dev        # 设备文件（串口在这里！如 /dev/ttyUSB0）\n/proc       # 进程信息（虚拟文件系统）\n/mnt        # 手动挂载点\n\n# 查看目录树结构\ntree -L 2 /  # 显示两层深度（需安装 tree）",
           tip:"ESP32 的串口设备文件在 /dev/ttyUSB0 或 /dev/ttyACM0，以后调试时会经常跟 /dev 打交道"},
          {name:"目录导航命令",
           explain:"cd、pwd、ls 是你每天用得最多的三个命令，跟呼吸一样自然。",
           code:"# 当前位置\npwd                    # Print Working Directory\n\n# 切换目录\ncd /home               # 去绝对路径\ncd Documents           # 去相对路径\ncd ..                  # 上一级\ncd ../..               # 上两级\ncd ~                   # 回 home 目录（等于 cd）\ncd -                   # 回上一次的目录（很好用！）\n\n# 列出文件\nls                     # 基本列表\nls -l                  # 长格式（权限、大小、时间）\nls -la                 # 包含隐藏文件（.开头的）\nls -lh                 # 文件大小用人类可读格式\nls -lt                 # 按时间排序（最新在前）\nls -lS                 # 按大小排序\nls -R                  # 递归列出子目录\n\n# 类型感知列表\nls -F                  # 目录加/，可执行加*\nls --color=auto        # 彩色显示（一般默认开启）",
           tip:"设置别名可以省很多事：alias ll='ls -lah' 加到 ~/.bashrc 里永久生效"}
        ],
        exercise:"从 home 目录出发，用 cd 导航到 /etc，用 ls -la 列出文件，然后用 cd - 跳回来；用 ls -lhS 找出 home 目录下最大的 5 个文件。"
      },
      {
        day:3, title:"文件与目录操作", tags:["文件","mkdir","cp","mv","rm"],
        topics:[
          {name:"创建与删除",
           explain:"文件和目录的增删操作是 Shell 的基础中的基础。注意：Shell 里删除没有回收站！rm 删了就真没了。",
           code:"# 创建目录\nmkdir myproject            # 创建单个\nmkdir -p a/b/c/d           # 递归创建多层\nmkdir -p project/{src,lib,docs,test}  # 一次创建多个子目录\n\n# 创建文件\ntouch newfile.txt          # 创建空文件（或更新时间戳）\ntouch file{1..5}.txt       # 批量创建 file1~file5\n\n# 删除文件\nrm file.txt                # 删除文件\nrm -i file.txt             # 删前确认（安全！）\nrm -f file.txt             # 强制删除不提示\n\n# 删除目录\nrmdir emptydir             # 只能删空目录\nrm -r mydir                # 递归删除目录及内容\nrm -rf mydir               # 强制递归删除（危险！）\n\n# ⚠️ 永远不要执行: rm -rf /",
           tip:"养成好习惯：删除前先用 ls 确认目标，或者用 rm -i 交互模式"},
          {name:"复制、移动与重命名",
           explain:"cp 复制，mv 移动（也用来重命名）。这两个命令的参数逻辑完全一样：源文件在前，目标在后。",
           code:"# 复制\ncp source.txt dest.txt            # 复制文件\ncp source.txt /path/to/dir/       # 复制到目录\ncp -r srcdir/ destdir/            # 递归复制整个目录\ncp -i source.txt dest.txt         # 覆盖前确认\ncp -u source.txt dest.txt         # 只在源更新时复制\ncp -v source.txt dest.txt         # 显示复制过程\n\n# 移动/重命名\nmv oldname.txt newname.txt        # 重命名\nmv file.txt /path/to/dir/         # 移动文件\nmv -i source dest                 # 覆盖前确认\nmv *.txt textfiles/               # 批量移动\n\n# 实用技巧：备份文件\ncp config.yaml config.yaml.bak    # 修改前备份\ncp config.yaml{,.bak}             # 等效简写",
           tip:"mv 重命名文件几乎是瞬间完成的（同一分区内只改指针），但 cp 是真的复制数据"}
        ],
        exercise:"创建一个项目目录结构：project/{src,config,logs,backup}；在 src 里创建 5 个 .sh 文件；把它们复制到 backup；然后把 logs 里的内容全部删除。"
      },
      {
        day:4, title:"文件内容查看与搜索", tags:["cat","less","grep","head","tail"],
        topics:[
          {name:"查看文件内容",
           explain:"Shell 提供了多种查看文件的方式，适合不同场景。cat 适合短文件，less 适合长文件，head/tail 适合只看开头或结尾。",

          {name:"项目部署脚本",
           explain:"一个完整的自动化部署脚本模板，适合 Web 项目或 Python 服务。",
           code:"#!/bin/bash\nset -euo pipefail\n\nAPP_NAME=\"manga-pipeline\"\nDEPLOY_DIR=\"/opt/$APP_NAME\"\nBACKUP_DIR=\"/opt/backups/$APP_NAME\"\nLOG_FILE=\"/var/log/${APP_NAME}-deploy.log\"\n\nlog()  { echo \"[$(date '+%H:%M:%S')] $*\" | tee -a \"$LOG_FILE\"; }\ndie()  { log \"ERROR: $*\"; exit 1; }\n\n# 前置检查\npre_check() {\n    log \"=== 开始部署 ===\"\n    command -v python3 >/dev/null || die \"Python3 未安装\"\n    command -v git >/dev/null || die \"Git 未安装\"\n    [ -d \"$DEPLOY_DIR\" ] || die \"部署目录不存在\"\n}\n\n# 备份\nbackup() {\n    log \"备份当前版本...\"\n    local ts=$(date +%Y%m%d_%H%M%S)\n    mkdir -p \"$BACKUP_DIR\"\n    tar czf \"$BACKUP_DIR/${ts}.tar.gz\" -C \"$DEPLOY_DIR\" .\n    log \"备份完成: ${ts}.tar.gz\"\n}\n\n# 部署\ndeploy() {\n    log \"拉取最新代码...\"\n    cd \"$DEPLOY_DIR\"\n    git pull origin main\n    \n    log \"安装依赖...\"\n    pip3 install -r requirements.txt -q\n    \n    log \"重启服务...\"\n    sudo systemctl restart \"$APP_NAME\"\n    sleep 3\n    \n    if systemctl is-active --quiet \"$APP_NAME\"; then\n        log \"部署成功！服务运行中\"\n    else\n        log \"服务启动失败，回滚...\"\n        rollback\n    fi\n}\n\n# 回滚\nrollback() {\n    local latest=$(ls -t \"$BACKUP_DIR\"/*.tar.gz | head -1)\n    [ -f \"$latest\" ] || die \"没有备份可回滚\"\n    log \"回滚到: $latest\"\n    tar xzf \"$latest\" -C \"$DEPLOY_DIR\"\n    sudo systemctl restart \"$APP_NAME\"\n}\n\npre_check\nbackup\ndeploy"}

function getPhaseForDay(d) {
  if(d <= 7) return "第一阶段：基础命令";
  if(d <= 14) return "第二阶段：脚本编程";
  if(d <= 19) return "第三阶段：文本处理";
  if(d <= 23) return "第四阶段：系统管理";
  if(d <= 30) return "第五阶段：综合实战";
}

function getAllDays() { return curriculum[0].days; }

function getDayStatus(n) {
  if(completed.includes(n)) return "completed";
  const s = new Date(startDate), t = new Date(); t.setHours(0,0,0,0);
  const target = new Date(s); target.setDate(s.getDate()+n-1);
  if(target.toDateString()===t.toDateString()) return "today";
  return "available";
}

function toggleComplete(d) {
  if(completed.includes(d)) completed = completed.filter(x=>x!==d);
  else completed.push(d);
  localStorage.setItem("shell30_done", JSON.stringify(completed));
  render();
}

    <div class="modal-title">${day.title}</div>
    <div class="modal-tags">${day.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>

  if(day.topics) {
    day.topics.forEach((topic, i) => {
      html += `

          <div class="topic-head" onclick="toggleTopic(this)">
            <span class="topic-name">${topic.name}</span>

    html += `

  const toggle = el.querySelector('.topic-toggle');

function highlightShell(code) {
  var lines = code.split('\n');
  var result = lines.map(function(line) {
    var escaped = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // 检测是否是纯注释行（行首可选空格后跟 # ）或 shebang
    if (/^\s*#/.test(escaped)) {
      return '<span class="comment">' + escaped + '</span>';
    }
    // 处理行尾注释：找到代码部分和注释部分
    var codePart = escaped;
    var commentPart = '';
    // 简单启发式：找不在引号内的 # （前面是空格）
    var inSingle = false, inDouble = false, splitIdx = -1;
    for (var i = 0; i < escaped.length; i++) {
      var ch = escaped[i];
      if (ch === "'" && !inDouble) inSingle = !inSingle;
      else if (ch === '"' && !inSingle) inDouble = !inDouble;
      else if (ch === '#' && !inSingle && !inDouble) {
        // 确认不是 ${# 或 $# 等变量语法
        if (i > 0 && (escaped[i-1] === '{' || escaped[i-1] === '$')) continue;
        splitIdx = i;
        break;
      }
    }
    if (splitIdx > 0) {
      codePart = escaped.substring(0, splitIdx);
      commentPart = '<span class="comment">' + escaped.substring(splitIdx) + '</span>';
    }
    // 高亮代码部分
    codePart = codePart
      .replace(/\b(if|then|else|elif|fi|for|do|done|while|until|case|esac|function|return|local|readonly|export|declare|set|trap|shift|break|continue|in)\b/g,'<span class="keyword">$1</span>')
      .replace(/(\$\{?[\w@#?!*]+\}?)/g,'<span class="var">$1</span>')
      .replace(/"([^"]*?)"/g,'"<span class="string">$1</span>"')
      .replace(/'([^']*?)'/g,"'<span class=\"string\">$1</span>'");
    return codePart + commentPart;
  });
  return result.join('\n');
}

function render() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const days = getAllDays();
  let html = '';
  let currentPhase = '';

  const filtered = days.filter(d => {
    const status = getDayStatus(d.day);
    const isDone = completed.includes(d.day);
    if(currentFilter === 'done' && !isDone) return false;
    if(currentFilter === 'todo' && isDone) return false;
    if(query) {
      const searchable = `${d.title} ${d.tags.join(' ')} ${(d.topics||[]).map(t=>t.name).join(' ')}`.toLowerCase();
      if(!searchable.includes(query)) return false;
    }
    return true;
  });

  filtered.forEach(day => {
    const phase = getPhaseForDay(day.day);
    if(phase !== currentPhase) {
      if(currentPhase) html += '</div>';
      currentPhase = phase;
      html += `<div class="phase-title">${phase}</div><div class="grid">`;
    }
    const status = getDayStatus(day.day);
    const isDone = completed.includes(day.day);
    const preview = (day.topics||[]).map(t=>t.name).join(' · ');
    html += `
      <div class="card ${status} ${isDone?'completed':''}" onclick="openModal(${day.day})">
        <div class="card-head">
          <span class="day-num">DAY ${String(day.day).padStart(2,'0')}</span>
          ${isDone?'<span class="badge done">✓ Done</span>':status==='today'?'<span class="badge now">Today</span>':''}
        </div>
        <div class="card-title">${day.title}</div>
        <div class="card-tags">${day.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <div class="card-preview">${preview}</div>
        <div class="card-foot">
          <button class="complete-btn ${isDone?'done':''}" onclick="event.stopPropagation();toggleComplete(${day.day})">
            ${isDone?'✓ 完成':'标记完成'}
          </button>
          <button class="detail-btn" onclick="event.stopPropagation();openModal(${day.day})">查看详情 →</button>
        </div>
      </div>
    `;
  });
  if(currentPhase) html += '</div>';
  if(!html) html = '<div style="text-align:center;padding:3rem;color:var(--muted)">没有匹配的课程</div>';

  document.getElementById('content').innerHTML = html;

  // Update stats
  const doneCount = completed.length;
  document.getElementById('s-done').textContent = `${doneCount}/30`;
  document.getElementById('s-pct').textContent = `${Math.round(doneCount/30*100)}%`;
  document.getElementById('pbar').style.width = `${doneCount/30*100}%`;

  // Current phase
  const nextDay = days.find(d => !completed.includes(d.day));
  document.getElementById('s-phase').textContent = nextDay ? getPhaseForDay(nextDay.day).replace('第','').split('：')[0] : '完成!';

  // Streak
  let streak = 0;
  for(let i = 1; i <= 30; i++) {
    if(completed.includes(i)) streak++;
    else break;
  }
  document.getElementById('s-streak').textContent = streak;
}

document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeModal();
});

render();

// Daily reminder
setTimeout(() => {
  const today = getAllDays().find(d => getDayStatus(d.day)==='today');
  if(today && !completed.includes(today.day)) {
    showToast(`今日课程: Day ${today.day} — ${today.title}`);
  }
}, 1500);
</script>
</body>
</html>
